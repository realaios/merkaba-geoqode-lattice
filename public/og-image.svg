<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Hex grid background -->
  <g opacity="0.05" stroke="#06b6d4" stroke-width="1" fill="none">
    <polygon points="600,80 660,115 660,185 600,220 540,185 540,115"/>
    <polygon points="480,150 540,185 540,255 480,290 420,255 420,185"/>
    <polygon points="720,150 780,185 780,255 720,290 660,255 660,185"/>
  </g>
  <!-- AIOS logo / symbol -->
  <circle cx="600" cy="185" r="60" fill="none" stroke="url(#cyan)" stroke-width="2" opacity="0.8"/>
  <circle cx="600" cy="185" r="40" fill="none" stroke="#06b6d470" stroke-width="1"/>
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="#06b6d4" font-weight="800">AIOS</text>
  <!-- Headline -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="58" text-anchor="middle" fill="white" font-weight="800" letter-spacing="-1">AI-Native Operating System</text>
  <text x="600" y="348" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#67e8f9">Autonomous &#xB7; Resonance-Certified &#xB7; Self-Evolving</text>
  <rect x="520" y="368" width="160" height="2" fill="url(#cyan)" rx="1"/>
  <!-- Founding partner -->
  <rect x="360" y="390" width="480" height="56" rx="28" fill="#06b6d415" stroke="#06b6d430" stroke-width="1"/>
  <text x="600" y="424" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#67e8f9">Early access open &#x2014; <tspan fill="#fbbf24" font-weight="700">Try free at realaios.com</tspan></text>
  <!-- URL -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#164e63">realaios.com</text>
  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#cyan)"/>
</svg>
