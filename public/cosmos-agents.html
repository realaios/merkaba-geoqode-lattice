        // ── Compute lattice positions ──────────────────────────────────────────────
        (function buildPositions() {
          var d8 = AIOS_AGENTS.filter(function (a) {
            return a.lat === 8;
          });
          var d26 = AIOS_AGENTS.filter(function (a) {
            return a.lat === 26;
          });
          var d48 = AIOS_AGENTS.filter(function (a) {
            return a.lat === 48;
          });

          // D8: single ring R=14, alternating y=±3
          d8.forEach(function (a, i) {
            var angle = (i / d8.length) * Math.PI * 2;
            a.pos = [
              14 * Math.cos(angle),
              i % 2 === 0 ? 3 : -3,
              14 * Math.sin(angle),
            ];
          });

          // D26: two rings R=22, y=+9 (first half) / y=-9 (second half)
          d26.forEach(function (a, i) {
            var half = Math.floor(d26.length / 2);
            var inRing = i < half ? i : i - half;
            var ringLen = i < half ? half : d26.length - half;
            var angle = (inRing / ringLen) * Math.PI * 2;
            var y = i < half ? 9 : -9;
            a.pos = [22 * Math.cos(angle), y, 22 * Math.sin(angle)];
          });

          // D48: two rings R=33, y=+5 / y=-5, plus extra nodes offset outward
          d48.forEach(function (a, i) {
            var half = Math.floor(d48.length / 2);
            var inRing = i < half ? i : i - half;
            var ringLen = i < half ? half : d48.length - half;
            var angle = (inRing / ringLen) * Math.PI * 2;
            var y = i < half ? 5 : -5;
            a.pos = [33 * Math.cos(angle), y, 33 * Math.sin(angle)];
          });
        })();

        // Index by id
        var AGENT_MAP = {};
        AIOS_AGENTS.forEach(function (a) {
          AGENT_MAP[a.id] = a;
        });

        // ── Build star field ───────────────────────────────────────────────────────
        var _scene = null;
        var _nodesEl = null;
        var _linesEl = null;
        var _selectedId = null;
        var _ws = null;
        var _flyTarget = null;

        window.addEventListener("DOMContentLoaded", function () {
          _buildAgentList();
          _pollServices();
          setInterval(_pollServices, 45000);
          _connectWS();
        });

        document
          .querySelector("a-scene")
          .addEventListener("loaded", function () {
            _scene = document.querySelector("a-scene");
            _nodesEl = document.getElementById("cp-nodes");
            _linesEl = document.getElementById("cp-lines");
            _buildStars();
            _buildNodes();
            _buildConnections();
            _animateLoop();
          });

        // ── Build procedural star field ────────────────────────────────────────────
        function _buildStars() {
          var THREE = AFRAME.THREE;
          var pts = [];
          for (var i = 0; i < 3000; i++) {
            var r = 400 + Math.random() * 600;
            var theta = Math.acos(2 * Math.random() - 1);
            var phi = Math.random() * Math.PI * 2;
            pts.push(
              new THREE.Vector3(
                r * Math.sin(theta) * Math.cos(phi),
                r * Math.sin(theta) * Math.sin(phi),
                r * Math.cos(theta),
              ),
            );
          }
          var geo = new THREE.BufferGeometry().setFromPoints(pts);
          var mat = new THREE.PointsMaterial({
            color: 0xaaccff,
            size: 0.6,
            sizeAttenuation: true,
          });
          var stars = new THREE.Points(geo, mat);
          stars.frustumCulled = false;
          _scene.object3D.add(stars);
        }

        // ── Build 3-D agent node entities ─────────────────────────────────────────
        var NODE_SCALE = {
          ORCHESTRATOR: 1.3,
          SWARM: 1.1,
          BRAIN: 1.0,
          AGENT: 0.8,
          MONITOR: 0.85,
          INFRASTRUCTURE: 0.75,
        };
        var NODE_GEOM = {
          ORCHESTRATOR: "a-octahedron",
          SWARM: "a-icosahedron",
          BRAIN: "a-sphere",
          AGENT: "a-tetrahedron",
          MONITOR: "a-dodecahedron",
          INFRASTRUCTURE: "a-box",
        };

        function _buildNodes() {
          AIOS_AGENTS.forEach(function (agent) {
            var color = FREQ_COLOR[agent.freq] || "#ffffff";
            var scale = NODE_SCALE[agent.type] || 1.0;
            var geomTag = NODE_GEOM[agent.type] || "a-sphere";
            var radius =
              (agent.lat === 8 ? 1.2 : agent.lat === 26 ? 0.95 : 0.7) * scale;

            var wrapper = document.createElement("a-entity");
            wrapper.setAttribute("id", "cp-node-" + agent.id);
            wrapper.setAttribute("position", agent.pos.join(" "));
            wrapper.setAttribute("data-agent-id", agent.id);

            // Main geometry (wireframe)
            var mesh = document.createElement(geomTag);
            if (
              geomTag === "a-sphere" ||
              geomTag === "a-octahedron" ||
              geomTag === "a-icosahedron" ||
              geomTag === "a-dodecahedron"
            ) {
              mesh.setAttribute("radius", radius);
            } else if (geomTag === "a-tetrahedron") {
              mesh.setAttribute("radius", radius);
            } else {
              mesh.setAttribute("width", radius * 1.4);
              mesh.setAttribute("height", radius * 1.4);
              mesh.setAttribute("depth", radius * 1.4);
            }
            mesh.setAttribute(
              "material",
              "color: " +
                color +
                "; wireframe: true; opacity: 0.85; transparent: true",
            );

            // Glow sphere
            var glow = document.createElement("a-sphere");
            glow.setAttribute("radius", radius * 1.5);
            glow.setAttribute(
              "material",
              "color: " +
                color +
                "; opacity: 0.08; transparent: true; shader: flat; side: back",
            );

            // Label
            var label = document.createElement("a-text");
            label.setAttribute("value", agent.name.slice(0, 20));
            label.setAttribute("align", "center");
            label.setAttribute("color", color);
            label.setAttribute("width", agent.lat === 8 ? 10 : 8);
            label.setAttribute("position", "0 " + radius * 2.2 + " 0");
            label.setAttribute("look-at", "#cp-camera");
            label.setAttribute("font", "monoid");
            label.setAttribute("letter-spacing", "1");

            // Slow rotation
            var anim = document.createElement("a-animation");
            anim.setAttribute("attribute", "rotation");
            anim.setAttribute("from", "0 0 0");
            anim.setAttribute("to", "0 360 0");
            anim.setAttribute("dur", String(14000 + Math.random() * 8000));
            anim.setAttribute("repeat", "indefinite");
            anim.setAttribute("easing", "linear");
            wrapper.appendChild(anim);

            wrapper.appendChild(mesh);
            wrapper.appendChild(glow);
            wrapper.appendChild(label);

            // Click handler
            wrapper.setAttribute("class", "cp-clickable");
            wrapper.addEventListener("click", function () {
              _selectAgent(agent.id);
            });
            wrapper.addEventListener("mouseenter", function () {
              glow.setAttribute(
                "material",
                "color: " +
                  color +
                  "; opacity: 0.22; transparent: true; shader: flat; side: back",
              );
            });
            wrapper.addEventListener("mouseleave", function () {
              if (_selectedId !== agent.id) {
                glow.setAttribute(
                  "material",
                  "color: " +
                    color +
                    "; opacity: 0.08; transparent: true; shader: flat; side: back",
                );
              }
            });

            _nodesEl.appendChild(wrapper);
          });

          // Cursor for raycasting
          var camera = document.getElementById("cp-camera");
          if (!camera.querySelector("a-cursor")) {
            var cursor = document.createElement("a-cursor");
            cursor.setAttribute("raycaster", "objects: .cp-clickable");
            cursor.setAttribute("fuse", "false");
            camera.appendChild(cursor);
          }
        }

        // ── Build connection lines between related agents ──────────────────────────
        var CONNECTIONS = [
          ["storm-chat", "q-dd"],
          ["q-dd", "hyper-swarm"],
          ["storm-chat", "aios-api-gw"],
          ["geo-kernel", "dual-attest"],
          ["geo-kernel", "hebrew-geo"],
          ["geo-kernel", "transform420"],
          ["geo-kernel", "merkaba-bridge"],
          ["geo-kernel", "merkaba-alm"],
          ["cosmos-server", "cosmos-inf"],
          ["cosmos-server", "cosmos-lab"],
          ["cosmos-server", "cosmos-px"],
          ["aios-overwatch", "hyper-swarm"],
          ["aios-overwatch", "merkaba-aware"],
          ["merkaba-llm", "dual-attest"],
          ["merkaba-llm", "be-eye-swarm"],
          ["lab-agent", "d1-db"],
          ["lab-agent", "merkaba-llm"],
          ["asset-miner", "vr-taxonomy"],
          ["asset-miner", "mal-injector"],
          ["asset-miner", "vr-scene-gen"],
          ["s4ai-core", "merkaba-aware"],

        ];

        function _buildConnections() {
          var THREE = AFRAME.THREE;
          CONNECTIONS.forEach(function (pair) {
            var a = AGENT_MAP[pair[0]];
            var b = AGENT_MAP[pair[1]];
            if (!a || !b) return;
            var ap = new THREE.Vector3(a.pos[0], a.pos[1], a.pos[2]);
            var bp = new THREE.Vector3(b.pos[0], b.pos[1], b.pos[2]);
            var colorA = FREQ_COLOR[a.freq] || "#ffffff";
            var geo = new THREE.BufferGeometry().setFromPoints([ap, bp]);
            var mat = new THREE.LineBasicMaterial({
              color: colorA,
              transparent: true,
              opacity: 0.18,
            });
            var line = new THREE.Line(geo, mat);
            line.frustumCulled = false;
            _linesEl.object3D.add(line);
          });
        }

        // ── Select / fly-to agent ──────────────────────────────────────────────────
        function _selectAgent(id) {
          _selectedId = id;
          var agent = AGENT_MAP[id];
          if (!agent) return;

          // Highlight list
          document.querySelectorAll(".cp-agent-row").forEach(function (r) {
            r.classList.toggle("selected", r.dataset.agentId === id);
          });

          // Show detail popup
          document.getElementById("cp-detail").style.display = "block";
          document.getElementById("cp-detail-name").textContent = agent.name;
          var S = (
            ALPHA_W * (PHI / GOLDEN_BAND) +
            OMEGA_W * (PSI / GOLDEN_BAND)
          ).toFixed(4);
          document.getElementById("cp-detail-table").innerHTML = [
            "<tr><td>Type</td><td>" + agent.type + "</td></tr>",
            "<tr><td>Service</td><td>" + agent.service + "</td></tr>",
            "<tr><td>Lattice</td><td>D" + agent.lat + "</td></tr>",
            "<tr><td>Frequency</td><td>" + agent.freq + " Hz</td></tr>",
            "<tr><td>S-Score</td><td>" + S + " (ABSOLUTE)</td></tr>",
          ].join("");
          document.getElementById("cp-detail-desc").textContent = agent.desc;

          // Fly camera toward node
          var rig = document.getElementById("cp-rig");
          if (rig) {
            var p = agent.pos;
            var nx = p[0] * 0.75;
            var ny = p[1];
            var nz = p[2] * 0.75 + 8;
            rig.setAttribute("animation", {
              property: "position",
              to: nx + " " + ny + " " + nz,
              dur: 1200,
              easing: "easeInOutQuad",
            });
          }
        }

        window.cpCloseDetail = function () {
          document.getElementById("cp-detail").style.display = "none";
          _selectedId = null;
          document.querySelectorAll(".cp-agent-row").forEach(function (r) {
            r.classList.remove("selected");
          });
        };

        // ── Build left-panel agent list ────────────────────────────────────────────
        function _buildAgentList() {
          var container = document.getElementById("cp-agent-list");
          var byType = {};
          AIOS_AGENTS.forEach(function (a) {
            if (!byType[a.type]) byType[a.type] = [];
            byType[a.type].push(a);
          });

          var typeOrder = [
            "ORCHESTRATOR",
            "BRAIN",
            "SWARM",
            "MONITOR",
            "AGENT",
            "INFRASTRUCTURE",
          ];
          typeOrder.forEach(function (t) {
            if (!byType[t]) return;
            var cat = document.createElement("div");
            cat.className = "cp-category";
            cat.textContent = t;
            container.appendChild(cat);
            byType[t].forEach(function (agent) {
              var row = document.createElement("div");
              row.className = "cp-agent-row";
              row.dataset.agentId = agent.id;
              var dot = document.createElement("span");
              dot.className = "cp-freq-dot";
              dot.style.background = FREQ_COLOR[agent.freq] || "#fff";
              dot.style.boxShadow =
                "0 0 4px " + (FREQ_COLOR[agent.freq] || "#fff");
              var name = document.createElement("span");
              name.className = "cp-agent-name";
              name.textContent = agent.name.slice(0, 22);
              var svc = document.createElement("span");
              svc.className = "cp-agent-svc";
              svc.textContent = agent.service
                .replace("pwai-", "")
                .replace("merkaba-geoqode-", "m-")
                .slice(0, 14);
              row.appendChild(dot);
              row.appendChild(name);
              row.appendChild(svc);
              row.addEventListener("click", function () {
                _selectAgent(agent.id);
              });
              container.appendChild(row);
            });
          });
        }

        // ── Service health polling ─────────────────────────────────────────────────
        var SERVICES = [
          { id: "dot-api", url: "https://api.getbrains4ai.com/health" },
          { id: "dot-frontend", url: "https://getbrains4ai.com" },
          { id: "dot-aios-mesh", url: "https://aios-mesh.realaios.com/health" },
          { id: "dot-cosmos", url: "https://realaios.com" },
        ];

        function _pollServices() {
          SERVICES.forEach(function (svc) {
            var dot = document.getElementById(svc.id);
            if (!dot) return;
            var t0 = Date.now();
            fetch(svc.url, {
              method: "GET",
              mode: "no-cors",
              cache: "no-cache",
            })
              .then(function () {
                var ms = Date.now() - t0;
                dot.className = "dot " + (ms < 600 ? "green" : "yellow");
              })
              .catch(function () {
                dot.className = "dot red";
              });
          });
        }

        // ── WebSocket /ws/pixel ────────────────────────────────────────────────────
        function _connectWS() {
          var proto = location.protocol === "https:" ? "wss:" : "ws:";
          var url = proto + "//" + location.host + "/ws/pixel";
          try {
            _ws = new WebSocket(url);
          } catch (e) {
            return;
          }

          _ws.onopen = function () {
            document.getElementById("relay-status-text").textContent =
              "connected";
            document.getElementById("relay-status-text").style.color =
              "#00ff88";
            _ws.send(
              JSON.stringify({
                type: "cp-hello",
                name:
                  "OBSERVER-" +
                  Math.random().toString(36).slice(2, 6).toUpperCase(),
              }),
            );
          };

          _ws.onmessage = function (ev) {
            var msg;
            try {
              msg = JSON.parse(ev.data);
            } catch (_) {
              return;
            }

            if (msg.type === "cp-welcome") {
              document.getElementById("cp-count").textContent = msg.count || 0;
              if (msg.agentStatuses) {
                Object.keys(msg.agentStatuses).forEach(function (aid) {
                  _updateNodeStatus(aid, msg.agentStatuses[aid].status);
                });
              }
            } else if (msg.type === "cp-presence") {
              document.getElementById("cp-count").textContent = msg.count || 0;
              if (msg.joined) _addFeed("JOINED", msg.joined.name);
              if (msg.left) _addFeed("LEFT", msg.left.name);
            } else if (msg.type === "pixel-event") {
              var ev2 = msg.event || {};
              var type = ev2.type || ev2.eventType || "event";
              var body = ev2.agentId || ev2.data || "";
              _addFeed(
                type.toUpperCase().slice(0, 16),
                String(body).slice(0, 40),
              );
              if (ev2.agentId) _pulseNode(ev2.agentId);
            } else if (msg.type === "cp-agent-status") {
              _updateNodeStatus(msg.agentId, msg.status);
            }
          };

          _ws.onclose = function () {
            document.getElementById("relay-status-text").textContent =
              "disconnected";
            document.getElementById("relay-status-text").style.color =
              "#ff4444";
            setTimeout(_connectWS, 4000);
          };

          _ws.onerror = function () {
            document.getElementById("relay-status-text").textContent = "error";
            document.getElementById("relay-status-text").style.color =
              "#ff4444";
          };
        }

        function _addFeed(type, body) {
          var feed = document.getElementById("cp-feed");
          var row = document.createElement("div");
          row.className = "cp-feed-row";
          var d = new Date();
          var ts =
            d.getHours().toString().padStart(2, "0") +
            ":" +
            d.getMinutes().toString().padStart(2, "0") +
            ":" +
            d.getSeconds().toString().padStart(2, "0");
          row.innerHTML =
            '<span class="ts">' +
            ts +
            '</span> <span class="ev-type">' +
            type +
            '</span><span class="ev-body">' +
            body +
            "</span>";
          feed.insertBefore(row, feed.firstChild);
          while (feed.children.length > 80) feed.removeChild(feed.lastChild);
        }

        function _pulseNode(agentId) {
          var el = document.getElementById("cp-node-" + agentId);
          if (!el) return;
          el.setAttribute("animation__pulse", {
            property: "scale",
            from: "1 1 1",
            to: "1.5 1.5 1.5",
            dur: 300,
            dir: "alternate",
            loop: 2,
            easing: "easeInOutSine",
          });
        }

        function _updateNodeStatus(agentId, status) {
          var el = document.getElementById("cp-node-" + agentId);
          if (!el) return;
          var agent = AGENT_MAP[agentId];
          var color =
            status === "active"
              ? FREQ_COLOR[agent ? agent.freq : 72] || "#00ff88"
              : status === "error"
                ? "#ff4444"
                : "#555555";
          var mesh = el.firstElementChild;
          if (mesh)
            mesh.setAttribute(
              "material",
              "color: " +
                color +
                "; wireframe: true; opacity: 0.85; transparent: true",
            );
        }

        // ── Gentle orbital drift animation ────────────────────────────────────────
        var _t0 = Date.now();
        function _animateLoop() {
          var dt = (Date.now() - _t0) / 1000;
          // Slowly rotate the entire D8 ring
          AIOS_AGENTS.filter(function (a) {
            return a.lat === 8;
          }).forEach(function (agent, i) {
            var base = (i / 8) * Math.PI * 2;
            var angle = base + dt * 0.04;
            var el = document.getElementById("cp-node-" + agent.id);
            if (el)
              el.setAttribute(
                "position",
                14 * Math.cos(angle) +
                  " " +
                  agent.pos[1] +
                  " " +
                  14 * Math.sin(angle),
              );
          });
          requestAnimationFrame(_animateLoop);
        }

        // ── Keyboard shortcuts ────────────────────────────────────────────────────
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") cpCloseDetail();
          if (e.key === "v" || e.key === "V")
            document.querySelector("a-scene").enterVR();
        });
      })();
    </script>
