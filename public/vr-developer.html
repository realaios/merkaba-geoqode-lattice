<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Developer Access � AIOS</title>
    <meta
      name="description"
      content="AIOS developer access is not currently available."
    />
    <meta name="robots" content="noindex,nofollow" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #04080f;
        color: #edf4ff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        padding-top: 54px;
      }
      nav.site-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        height: 54px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(5, 10, 20, 0.95);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      }
      .site-nav-logo {
        font-size: 18px;
        font-weight: 800;
        color: #00d4ff;
        text-decoration: none;
        letter-spacing: -0.5px;
      }
      .site-nav-links {
        display: flex;
        align-items: center;
        gap: 2px;
        overflow-x: auto;
        scrollbar-width: none;
        flex: 1;
      }
      .site-nav-links a {
        color: rgba(248, 250, 252, 0.5);
        font-size: 0.82rem;
        font-weight: 500;
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 6px;
        white-space: nowrap;
        transition: color 0.15s;
      }
      .site-nav-links a:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.07);
      }
      .site-nav-cta {
        background: #00d4ff;
        color: #000;
        font-weight: 700;
        font-size: 0.78rem;
        padding: 6px 14px;
        border-radius: 6px;
        text-decoration: none;
        margin-left: auto;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 460px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 3rem 2.5rem;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1.25rem;
      }
      h1 {
        font-size: 1.65rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 0.75rem;
        color: #edf4ff;
      }
      p {
        font-size: 0.95rem;
        color: #64748b;
        line-height: 1.7;
        margin-bottom: 1.5rem;
      }
      a.btn {
        display: inline-block;
        background: #00d4ff;
        color: #000;
        font-weight: 700;
        font-size: 0.88rem;
        padding: 0.7rem 1.6rem;
        border-radius: 8px;
        text-decoration: none;
        transition: opacity 0.2s;
      }
      a.btn:hover {
        opacity: 0.85;
      }
      footer {
        text-align: center;
        padding: 1.5rem;
        font-size: 12px;
        color: #334155;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
  </head>
  <body>
    <nav class="site-nav">
      <a href="/" class="site-nav-logo">&#x2B21; AIOS</a>
      <div class="site-nav-links"><a href="/vr">&#x1F97D; VR</a><a href="/news">News</a></div>
      <a href="/start" class="site-nav-cta">Start Free &#x2192;</a>
    </nav>
    <main>
      <div class="card">
        <div class="icon"></div>
        <h1>Developer Access<br />Not Available</h1>
        <p>
          External developer access to AIOS is not open at this time. Check back
          later or explore the platform as a user.
        </p>
        <a href="/" class="btn">Back to AIOS &rarr;</a>
      </div>
    </main>
    <footer>&copy; 2026 AIOS &nbsp;&middot;&nbsp; realaios.com</footer>
  </body>
</html>
