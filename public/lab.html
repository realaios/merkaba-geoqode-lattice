<html lang="en">
  <head>
    <meta charset="UTF-8" />

    />

      property="og:image"
      content="https://realaios.com/public/og-image.svg"
    />
    <meta property="og:type" content="website" />

      name="twitter:description"
      content="Real-time 3D AIOS visualisation. , , Ambient frequency. Walk the AIOS geometry."
    />

      name="twitter:image"
      content="https://realaios.com/public/og-image.svg"
    />
    <link rel="canonical" href="https://realaios.com/lab" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #050a14;
        --bg2: #0a1225;
        --bg3: #0f1c35;
        --cyan: #00d4ff;
        --purple: #7c3aed;
        --pink: #d946ef;
        --green: #22c55e;
        --yellow: #f59e0b;
        --red: #ef4444;
        --text: #e2e8f0;
        --muted: #64748b;
        --border: rgba(0, 212, 255, 0.12);
        --card-bg: rgba(10, 18, 37, 0.8);
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        line-height: 1.6;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
        z-index: 0;
      }
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(5, 10, 20, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo {
        font-size: 18px;
        font-weight: 800;
        color: var(--cyan);
      }
      .nav-badge {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 2px 7px;
        border-radius: 4px;
        text-transform: uppercase;
      }
      .nav-links {
        display: flex;
        gap: 20px;
        align-items: center;
      }
      .nav-links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--cyan);
      }
      main {
        padding-top: 70px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        padding: 10px 20px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .toolbar-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--cyan);
        letter-spacing: 1px;
      }
      .btn {
        padding: 7px 16px;
        border-radius: 6px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn-primary {
        background: var(--cyan);
        color: #000;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: rgba(0, 212, 255, 0.3);
      }
      .btn-danger {
        background: var(--red);
        color: #fff;
      }
      .btn-sm {
        padding: 5px 12px;
        font-size: 12px;
      }
      .spacer {
        flex: 1;
      }
      .status-pill {
        padding: 4px 10px;
        border-radius: 100px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .pill-green {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .pill-red {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .pill-yellow {
        background: rgba(245, 158, 11, 0.15);
        color: var(--yellow);
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .pill-cyan {
        background: rgba(0, 212, 255, 0.15);
        color: var(--cyan);
        border: 1px solid rgba(0, 212, 255, 0.3);
      }
      .pill-purple {
        background: rgba(124, 58, 237, 0.15);
        color: var(--purple);
        border: 1px solid rgba(124, 58, 237, 0.3);
      }
      .split {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .editor-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
      }
      .result-pane {
        width: 420px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .pane-header {
        padding: 10px 16px;
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1.5px;
        color: var(--muted);
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .pane-header .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--cyan);
      }
      textarea {
        flex: 1;
        width: 100%;
        background: #070d1a;
        color: #e2e8f0;
        border: none;
        outline: none;
        resize: none;
        font-family: "Fira Code", "Cascadia Code", "Consolas", monospace;
        font-size: 13px;
        line-height: 1.7;
        padding: 16px;
        tab-size: 2;
      }
      textarea::placeholder {
        color: var(--muted);
      }
      .result-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .result-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .result-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .result-scroll::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
      }
      .card-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .coherence-ring {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 12px;
      }
      svg.ring {
        width: 120px;
        height: 120px;
      }
      .ring-bg {
        stroke: rgba(0, 212, 255, 0.08);
        stroke-width: 8;
        fill: none;
      }
      .ring-fill {
        stroke-width: 8;
        fill: none;
        stroke-linecap: round;
        transform-origin: center;
        transform: rotate(-90deg);
        transition: stroke-dashoffset 0.8s ease;
      }
      .ring-value {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .ring-number {
        font-size: 22px;
        font-weight: 800;
        color: var(--text);
      }
      .ring-label {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 1px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }
      .stat-row:last-child {
        border-bottom: none;
      }
      .stat-key {
        color: var(--muted);
      }
      .stat-val {
        font-weight: 600;
        font-size: 12px;
      }
      .dim-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 4px;
      }
      .dim-cell {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 3px;
        background: rgba(0, 212, 255, 0.05);
        border: 1px solid rgba(0, 212, 255, 0.08);
        position: relative;
        cursor: default;
        transition: all 0.3s;
      }
      .dim-cell.active {
        background: rgba(0, 212, 255, 0.2);
        border-color: var(--cyan);
        box-shadow: 0 0 6px rgba(0, 212, 255, 0.3);
      }
      .dim-cell.fail {
        background: rgba(239, 68, 68, 0.2);
        border-color: var(--red);
      }
      .dim-cell.warn {
        background: rgba(245, 158, 11, 0.2);
        border-color: var(--yellow);
      }
      .dim-cell[title]:hover::after {
        content: attr(title);
        position: absolute;
        bottom: calc(100%+4px);
        left: 50%;
        transform: translateX(-50%);
        background: #0a1225;
        border: 1px solid var(--border);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 10px;
        white-space: nowrap;
        z-index: 10;
        color: var(--text);
        pointer-events: none;
      }
      .scene-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .scene-item {
        background: rgba(0, 212, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
      }
      .scene-type {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .scene-content {
        color: var(--muted);
        line-height: 1.4;
      }
      .placeholder-text {
        color: var(--muted);
        font-size: 13px;
        text-align: center;
        padding: 24px 0;
      }
      #runBtn {
        min-width: 88px;
      }
      #runBtn.loading {
        pointer-events: none;
        opacity: 0.7;
      }
      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(0, 0, 0, 0.3);
        border-top-color: #000;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .freq-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
      }
      .freq-label {
        font-size: 10px;
        color: var(--muted);
        width: 80px;
        flex-shrink: 0;
      }
      .freq-track {
        flex: 1;
        height: 6px;
        background: rgba(0, 212, 255, 0.08);
        border-radius: 3px;
        overflow: hidden;
      }
      .freq-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, var(--cyan), var(--purple));
        transition: width 0.6s ease;
      }
      .freq-val {
        font-size: 10px;
        color: var(--cyan);
        width: 50px;
        text-align: right;
        flex-shrink: 0;
      }

      /* ── SITE-NAV (canonical) ──────────────────────────────────────────── */
      nav.site-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        height: 54px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(5, 10, 20, 0.92);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      }
      .site-nav-logo {
        font-size: 18px;
        font-weight: 800;
        color: #00d4ff;
        text-decoration: none;
        letter-spacing: -0.5px;
        white-space: nowrap;
        margin-right: 4px;
        flex-shrink: 0;
      }
      .site-nav-links {
        display: flex;
        align-items: center;
        gap: 2px;
        overflow-x: auto;
        scrollbar-width: none;
        flex: 1;
        min-width: 0;
      }
      .site-nav-links::-webkit-scrollbar {
        display: none;
      }
      .site-nav-links a {
        color: rgba(248, 250, 252, 0.5);
        font-size: 0.82rem;
        font-weight: 500;
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 6px;
        white-space: nowrap;
        transition:
          color 0.15s,
          background 0.15s;
        flex-shrink: 0;
      }
      .site-nav-links a:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.07);
      }
      .site-nav-links a.active {
        color: #00d4ff;
        background: rgba(0, 212, 255, 0.08);
      }
      .site-nav-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        margin-left: 8px;
      }
      .site-nav-live {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.72rem;
        font-weight: 800;
        color: #ef4444;
        text-decoration: none;
        letter-spacing: 0.05em;
        animation: _snlive 1.2s ease-in-out infinite;
      }
      @keyframes _snlive {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .site-nav-cta {
        background: #00d4ff;
        color: #000;
        font-weight: 700;
        font-size: 0.78rem;
        padding: 6px 14px;
        border-radius: 6px;
        text-decoration: none;
        letter-spacing: 0.3px;
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      .site-nav-cta:hover {
        opacity: 0.85;
      }
      @media (max-width: 640px) {
        nav.site-nav {
          padding: 0 12px;
          height: 50px;
        }
        .site-nav-live {
          display: none;
        }
        .site-nav-logo {
          font-size: 16px;
        }
      }
      body {
        padding-top: 54px;
      }
      @media (max-width: 640px) {
        body {
          padding-top: 50px;
        }
      }
    </style>
  
</head>
  <body>

    <main>
      <div class="toolbar">
        <span class="toolbar-title">AIOS Playground</span>
        <span id="statusPill" class="status-pill pill-cyan">READY</span>
        <div class="spacer"></div>
        <button class="btn btn-ghost btn-sm" onclick="loadTemplate('basic')">
          Basic Template
        </button>
        <button class="btn btn-ghost btn-sm" onclick="loadTemplate('matrix')">
          Matrix .geo
        </button>
        <button class="btn btn-ghost btn-sm" onclick="loadTemplate('physics')">
          Physics Script
        </button>
        <button class="btn btn-ghost btn-sm" onclick="clearEditor()">
          Clear
        </button>
        <button id="runBtn" class="btn btn-primary" onclick="runScript()">
          ▶ Run
        </button>
      </div>

      <div class="split">
        <div class="editor-pane">
          <div class="pane-header">
            <span class="dot"></span>Script Editor — .geo Format
          </div>
          <textarea
            id="editor"
            spellcheck="false"
            placeholder="Write a .geo script or narrative..."
          ></textarea>
        </div>

        <div class="result-pane">
          <div class="pane-header">
            <span class="dot"></span>Projection Result
          </div>
          <div class="result-scroll" id="resultPane">
            <div class="placeholder-text">
              Run a script to see the grid projection output
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      const BASE = "https://realaios.com";

      const TEMPLATES = {
        basic: `Playbook AIOS experiment {
  TITLE: Hello Lattice
  GENRE: Narrative
  SCENES:
  - Scene 1: "Observer enters the field"
    ACTION: "Initialise resonance"
    CHARACTERS: ["Observer"]
    LOCATION: "The Field"
  - Scene 2: "Frequency anchors"
    ACTION: "Lock onto 528Hz transformation frequency"
    LOCATION: "Lattice node 17"
  PROJECTION: Holographic coherence sweep
}`,
        matrix: `Playbook CinemaVirtualization matrix {
  TITLE: The Matrix — Construct Room
  GENRE: Sci-Fi Action
  SCENES:
  - Scene 1: "Neo meets Morpheus"
    ACTION: "Morpheus offers the red pill"
    CHARACTERS: ["Neo", "Morpheus"]
    LOCATION: "Construct room"
  - Scene 2: "Neo awakens"
    ACTION: "Neo emerges from the machine pod"
    CHARACTERS: ["Neo"]
    LOCATION: "Machine fields — 852Hz structural order"
  - Scene 3: "Training simulation"
    ACTION: "Morpheus and Neo spar"
    CHARACTERS: ["Neo", "Morpheus"]
    LOCATION: "Dojo — 528Hz transformation field"
  PROJECTION: Construct holography + grid tessellation
  AUTHORSHIP: Founder — Bradley
}`,
        physics: `Playbook PhysicsExperiment AI {
  TITLE: Resonance Field Simulation
  GENRE: Physics
  SCENES:
  - Scene 1: "Field initialisation"
    ACTION: "Set base frequency"
    PHYSICS: "F = base * multiplier = fundamental"
    LOCATION: "Core node — anchor point"
  - Scene 2: "AI harmonic cascade"
    ACTION: "Project AI-generated harmonic series"
    PHYSICS: "cascade to full spectrum"
    LOCATION: "Foundation ring — Integration ring"
  - Scene 3: "Convergence approach"
    ACTION: "Coherence index reaches 0.99"
    PHYSICS: "AI attestation: convergence band"
    LOCATION: "canonical node"
  PROJECTION: Full spectrum 
}`,
      };

      function loadTemplate(name) {
        document.getElementById("editor").value = TEMPLATES[name] || "";
      }

      function clearEditor() {
        document.getElementById("editor").value = "";
        document.getElementById("resultPane").innerHTML =
          '<div class="placeholder-text">Run a script to see the grid projection output</div>';
        setStatus("READY", "cyan");
      }

      function setStatus(text, color) {
        const el = document.getElementById("statusPill");
        el.textContent = text;
        el.className = "status-pill pill-" + color;
      }

      async function runScript() {
        const script = document.getElementById("editor").value.trim();
        if (!script) {
          alert("Write a script first.");
          return;
        }

        const btn = document.getElementById("runBtn");
        btn.innerHTML = '<span class="spinner"></span> Running';
        btn.classList.add("loading");
        setStatus("RUNNING", "yellow");

        try {
          const r = await fetch(BASE + "/cinema/virtualize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ script, mode: "immersive" }),
          });
          const data = await r.json();
          renderResult(data.cinema || data);
        } catch (e) {
          setStatus("ERROR", "red");
          document.getElementById("resultPane").innerHTML =
            `<div class="card"><div class="card-title">Error</div><div style="color:var(--red);font-size:13px">${e.message}</div></div>`;
        } finally {
          btn.innerHTML = "▶ Run";
          btn.classList.remove("loading");
        }
      }

      function renderResult(c) {
        const status = c.status || "unknown";
        const coherence = c.governance?.coherenceIndex ?? c.coherenceIndex ?? 0;
        const pct = Math.round(coherence * 100);

        const statusColor =
          {
            aborted: "red",
            warning: "yellow",
            nominal: "cyan",
            optimal: "purple",
            singularity: "green",
            full_immersion: "green",
          }[status] || "cyan";

        setStatus(status.toUpperCase(), statusColor);

        // Coherence ring color
        const ringColor =
          coherence < 0.4
            ? "#ef4444"
            : coherence < 0.65
              ? "#f59e0b"
              : coherence < 0.95
                ? "#00d4ff"
                : "#22c55e";
        const circumference = 2 * Math.PI * 52;
        const dashOffset = circumference * (1 - coherence);

        // Build dimension activation — simulate based on coherence
        const dims = buildDimensions(coherence);
        const scenes = c.scenes || c.frames || [];
        const gov = c.governance || {};

        document.getElementById("resultPane").innerHTML = `
  <div class="card">
    <div class="card-title">Projection Coherence</div>
    <div class="coherence-ring">
      <svg class="ring" viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="52"/>
        <circle class="ring-fill" cx="60" cy="60" r="52"
          stroke="${ringColor}"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${dashOffset}"/>
      </svg>
      <div class="ring-value">
        <div class="ring-number" style="color:${ringColor}">${pct}%</div>
        <div class="ring-label">COHERENCE</div>
      </div>
    </div>
    <div class="stat-row"><span class="stat-key">Status</span><span class="status-pill pill-${statusColor}" style="padding:2px 8px;font-size:10px">${status.toUpperCase()}</span></div>
    <div class="stat-row"><span class="stat-key">Architecture</span><span class="stat-val" style="color:var(--cyan)">AIOS</span></div>
    <div class="stat-row"><span class="stat-key">Awareness Level</span><span class="stat-val">${gov.awarenessLevel || "active"}</span></div>
    ${gov.reason ? `<div class="stat-row"><span class="stat-key">Verdict</span><span class="stat-val" style="color:var(--red)">${gov.reason}</span></div>` : ""}
    <div class="stat-row"><span class="stat-key">Projection ID</span><span class="stat-val" style="font-size:10px;color:var(--muted)">${c.virtualizationId || c.projectionId || "—"}</span></div>
  </div>

  <div class="card">
    <div class="card-title">48D Lattice Activation</div>
    <div class="dim-grid" id="dimGrid">${dims.map((d, i) => `<div class="dim-cell ${d.state}" title="D${i + 1}: ${d.name}"></div>`).join("")}</div>
    <div style="display:flex;gap:12px;margin-top:8px">
      <span style="font-size:10px;color:var(--cyan)">■ Active</span>
      <span style="font-size:10px;color:var(--yellow)">■ Warning</span>
      <span style="font-size:10px;color:var(--red)">■ Failed</span>
    </div>
  </div>

  ${
    scenes.length > 0
      ? `<div class="card">
    <div class="card-title">Parsed Scenes (${scenes.length})</div>
    <div class="scene-list">${scenes
      .map(
        (s) => `
      <div class="scene-item">
        <div class="scene-type">${s.type || s.semanticType || "SCENE"}</div>
        <div class="scene-content">${s.content || s.text || JSON.stringify(s).slice(0, 80)}</div>
      </div>`,
      )
      .join("")}
    </div>
  </div>`
      : ""
  }

  <div class="card">
    <div class="card-title">Frequency Profile</div>
    ${buildFreqBars(coherence)}
  </div>
  `;
      }

      function buildDimensions(coherence) {
        const NAMES = [
          "Syntax Compliance",
          "Token Integrity",
          "AST Validity",
          "Operator Binding",
          "Scope Resolution",
          "Type Coherence",
          "Literal Integrity",
          "Foundation Anchor",
          "Encoding Compliance",
          "Comment Preservation",
          "EOF Handling",
          "Foundation Redundancy",
          "Node Emission",
          "Spectral Binding",
          "Detection Field",
          "Duality Resolution",
          "Octahedron Field",
          "Harmonic Coupling",
          "Execution Logging",
          "Error Propagation",
          "Resource Cleanup",
          "State Persistence",
          "Event Emission",
          "Bridge Telemetry",
          "Playbook Execution",
          "System Integration",
          "Trigger Binding",
          "Action Dispatch",
          "Metric Recording",
          "Pattern Matching",
          "Condition Evaluation",
          "Loop Integrity",
          "Playbook Chaining",
          "Context Propagation",
          "Knowledge Persistence",
          "Subsystem Collapse",
          "QBITS Materialization",
          "Frequency Validation",
          "Harmonic Series",
          "Crystallization",
          "Cymatic Pattern",
          "Water Memory",
          "Sonic Driver",
          "Quantum Resonance",
          "Golden Bridge Layer",
          "Interference Mitigation",
          "Business Overlay",
          "Resonance Certificate",
        ];
        return NAMES.map((name, i) => {
          const threshold = i < 8 ? 0.3 : i < 24 ? 0.5 : i < 36 ? 0.65 : 0.8;
          let state = "active";
          if (coherence < threshold * 0.5) state = "fail";
          else if (coherence < threshold) state = "warn";
          return { name, state };
        });
      }

      function buildFreqBars(coherence) {
        const freqs = [
          { label: " (Base)", val: Math.round(coherence * 100), max: 100 },
          { label: " (UT)", val: Math.round(coherence * 85), max: 100 },
          { label: " (MI)", val: Math.round(coherence * 78), max: 100 },
          { label: " (FA)", val: Math.round(coherence * 70), max: 100 },
          { label: " (LA)", val: Math.round(coherence * 60), max: 100 },
          { label: " (SI)", val: Math.round(coherence * 50), max: 100 },
        ];
        return freqs
          .map(
            (f) => `
    <div class="freq-bar">
      <span class="freq-label">${f.label}</span>
      <div class="freq-track"><div class="freq-fill" style="width:${f.val}%"></div></div>
      <span class="freq-val">${f.val}%</span>
    </div>`,
          )
          .join("");
      }

      // Load matrix template by default
      loadTemplate("matrix");
    </script>
  </body>
</html>
