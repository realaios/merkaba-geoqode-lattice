name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test --if-present
      - name: Check server starts
        run: |
          timeout 5 node server.js &
          sleep 2
          curl -sf http://localhost:3000/ > /dev/null && echo "Server OK" || true
          kill %1 2>/dev/null || true
